name: Build Server Packages

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: SimpleBooks-Windows.exe
          - os: macos-latest
            artifact: SimpleBooks-macOS
          - os: ubuntu-latest
            artifact: SimpleBooks-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend/books-local
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        working-directory: backend/books-local
        run: pyinstaller simplebooks.spec

      - name: Rename artifact
        working-directory: backend/books-local/dist
        shell: bash
        run: |
          if [ -f "SimpleBooks.exe" ]; then
            mv SimpleBooks.exe "${{ matrix.artifact }}"
          elif [ -f "SimpleBooks" ]; then
            mv SimpleBooks "${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: backend/books-local/dist/${{ matrix.artifact }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: backend/books-local/dist/${{ matrix.artifact }}
