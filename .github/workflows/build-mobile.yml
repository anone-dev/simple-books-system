name: Build Mobile App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable

      - name: Create platform files
        working-directory: frontend/books-mobile-app
        run: flutter create . --project-name books_mobile_app --platforms android

      - name: Install dependencies
        working-directory: frontend/books-mobile-app
        run: flutter pub get

      - name: Build APK
        working-directory: frontend/books-mobile-app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-debug.apk
          path: frontend/books-mobile-app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/books-mobile-app/build/app/outputs/flutter-apk/app-debug.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable

      - name: Create platform files
        working-directory: frontend/books-mobile-app
        run: flutter create . --project-name books_mobile_app --platforms ios

      - name: Install dependencies
        working-directory: frontend/books-mobile-app
        run: flutter pub get

      - name: Build iOS (simulator)
        working-directory: frontend/books-mobile-app
        run: flutter build ios --simulator

      - name: Create IPA
        working-directory: frontend/books-mobile-app
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphonesimulator
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/SimpleBooks.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: SimpleBooks.ipa
          path: frontend/books-mobile-app/build/ios/ipa/SimpleBooks.ipa

      - name: Upload IPA to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/books-mobile-app/build/ios/ipa/SimpleBooks.ipa
